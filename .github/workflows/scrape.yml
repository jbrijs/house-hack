name: Trigger Apify Scrapers

on:
  schedule:
    - cron: '0 12,0 * * *'  # 6am and 6pm MT (UTC-6 in winter)
  workflow_dispatch:         # allow manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_ZILLOW_ACTOR_ID: ${{ secrets.APIFY_ZILLOW_ACTOR_ID }}
      INGEST_WEBHOOK_URL: ${{ secrets.INGEST_WEBHOOK_URL }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}

    steps:
      - name: Trigger Zillow for-sale scraper
        run: |
          WEBHOOKS=$(python3 -c "
          import base64, json, os
          w = [{
            'eventTypes': ['ACTOR.RUN.SUCCEEDED'],
            'requestUrl': os.environ['INGEST_WEBHOOK_URL'],
            'payloadTemplate': '{\"eventData\": {{eventData}}, \"resource\": {{resource}}}',
            'headersTemplate': '{\"x-ingest-token\": \"' + os.environ['INGEST_TOKEN'] + '\", \"x-listing-type\": \"for_sale\"}'
          }]
          print(base64.b64encode(json.dumps(w).encode()).decode())
          ")

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.apify.com/v2/acts/$APIFY_ZILLOW_ACTOR_ID/runs?webhooks=$WEBHOOKS" \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "searchUrls": [
                {"url": "https://www.zillow.com/homes/for_sale/?searchQueryState=%7B%22isMapVisible%22%3Atrue%2C%22mapBounds%22%3A%7B%22west%22%3A-112.3%2C%22east%22%3A-111.15%2C%22south%22%3A39.85%2C%22north%22%3A40.45%7D%2C%22filterState%22%3A%7B%22sort%22%3A%7B%22value%22%3A%22days%22%7D%2C%22ah%22%3A%7B%22value%22%3Atrue%7D%7D%2C%22isListVisible%22%3Atrue%7D"},
                {"url": "https://www.zillow.com/homes/for_sale/?searchQueryState=%7B%22isMapVisible%22%3Atrue%2C%22mapBounds%22%3A%7B%22west%22%3A-112.2%2C%22east%22%3A-111.55%2C%22south%22%3A40.4%2C%22north%22%3A40.9%7D%2C%22filterState%22%3A%7B%22sort%22%3A%7B%22value%22%3A%22days%22%7D%2C%22ah%22%3A%7B%22value%22%3Atrue%7D%7D%2C%22isListVisible%22%3Atrue%7D"}
              ],
              "maxItems": 200,
              "proxyConfiguration": {"useApifyProxy": true, "apifyProxyGroups": ["RESIDENTIAL"]}
            }')
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: HTTP $HTTP_STATUS"; exit 1
          fi
          echo "For-sale scraper triggered"

      - name: Trigger Zillow rentals scraper
        run: |
          WEBHOOKS=$(python3 -c "
          import base64, json, os
          w = [{
            'eventTypes': ['ACTOR.RUN.SUCCEEDED'],
            'requestUrl': os.environ['INGEST_WEBHOOK_URL'],
            'payloadTemplate': '{\"eventData\": {{eventData}}, \"resource\": {{resource}}}',
            'headersTemplate': '{\"x-ingest-token\": \"' + os.environ['INGEST_TOKEN'] + '\", \"x-listing-type\": \"rental\"}'
          }]
          print(base64.b64encode(json.dumps(w).encode()).decode())
          ")

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.apify.com/v2/acts/$APIFY_ZILLOW_ACTOR_ID/runs?webhooks=$WEBHOOKS" \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "searchUrls": [
                {"url": "https://www.zillow.com/homes/for_rent/?searchQueryState=%7B%22isMapVisible%22%3Atrue%2C%22mapBounds%22%3A%7B%22west%22%3A-112.3%2C%22east%22%3A-111.15%2C%22south%22%3A39.85%2C%22north%22%3A40.45%7D%2C%22filterState%22%3A%7B%22sort%22%3A%7B%22value%22%3A%22days%22%7D%2C%22isForRent%22%3A%7B%22value%22%3Atrue%7D%7D%2C%22isListVisible%22%3Atrue%7D"},
                {"url": "https://www.zillow.com/homes/for_rent/?searchQueryState=%7B%22isMapVisible%22%3Atrue%2C%22mapBounds%22%3A%7B%22west%22%3A-112.2%2C%22east%22%3A-111.55%2C%22south%22%3A40.4%2C%22north%22%3A40.9%7D%2C%22filterState%22%3A%7B%22sort%22%3A%7B%22value%22%3A%22days%22%7D%2C%22isForRent%22%3A%7B%22value%22%3Atrue%7D%7D%2C%22isListVisible%22%3Atrue%7D"}
              ],
              "maxItems": 300,
              "proxyConfiguration": {"useApifyProxy": true, "apifyProxyGroups": ["RESIDENTIAL"]}
            }')
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: HTTP $HTTP_STATUS"; exit 1
          fi
          echo "Rentals scraper triggered"
