name: Trigger Apify Scrapers

on:
  schedule:
    - cron: '0 12,0 * * *'  # 6am and 6pm MT (UTC-6 in winter)
  workflow_dispatch:         # allow manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_ZILLOW_ACTOR_ID: ${{ secrets.APIFY_ZILLOW_ACTOR_ID }}
      INGEST_WEBHOOK_URL: ${{ secrets.INGEST_WEBHOOK_URL }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}

    steps:
      - name: Trigger Zillow for-sale scraper
        run: |
          WEBHOOKS=$(python3 -c "
          import base64, json
          w = [{
            'eventTypes': ['ACTOR.RUN.SUCCEEDED'],
            'requestUrl': '$INGEST_WEBHOOK_URL',
            'payloadTemplate': '{\"eventData\": {{eventData}}, \"resource\": {{resource}}}',
            'headersTemplate': '{\"x-ingest-token\": \"$INGEST_TOKEN\", \"x-listing-type\": \"for_sale\"}'
          }]
          print(base64.b64encode(json.dumps(w).encode()).decode())
          ")

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.apify.com/v2/acts/$APIFY_ZILLOW_ACTOR_ID/runs?webhooks=$WEBHOOKS" \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "searchUrls": [
                {"url": "https://www.zillow.com/homes/for_sale/Utah-County-UT_rb/"},
                {"url": "https://www.zillow.com/homes/for_sale/Salt-Lake-County-UT_rb/"}
              ],
              "maxItems": 200
            }')
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: HTTP $HTTP_STATUS"; exit 1
          fi
          echo "For-sale scraper triggered"

      - name: Trigger Zillow rentals scraper
        run: |
          WEBHOOKS=$(python3 -c "
          import base64, json
          w = [{
            'eventTypes': ['ACTOR.RUN.SUCCEEDED'],
            'requestUrl': '$INGEST_WEBHOOK_URL',
            'payloadTemplate': '{\"eventData\": {{eventData}}, \"resource\": {{resource}}}',
            'headersTemplate': '{\"x-ingest-token\": \"$INGEST_TOKEN\", \"x-listing-type\": \"rental\"}'
          }]
          print(base64.b64encode(json.dumps(w).encode()).decode())
          ")

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.apify.com/v2/acts/$APIFY_ZILLOW_ACTOR_ID/runs?webhooks=$WEBHOOKS" \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "searchUrls": [
                {"url": "https://www.zillow.com/homes/for_rent/Utah-County-UT_rb/"},
                {"url": "https://www.zillow.com/homes/for_rent/Salt-Lake-County-UT_rb/"}
              ],
              "maxItems": 300
            }')
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Error: HTTP $HTTP_STATUS"; exit 1
          fi
          echo "Rentals scraper triggered"
